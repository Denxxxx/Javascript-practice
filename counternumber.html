<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Counter App</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.counter-card{
    width:350px;
    border-radius:20px;
}

.counter-number{
    font-size:60px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card shadow-lg counter-card text-center p-4">

    <h3 class="mb-3">Counter Program</h3>

    <div class="counter-number text-primary mb-4" id="counter">
        0
    </div>

    <div class="d-flex justify-content-center gap-2">

        <button class="btn btn-success px-4" id="inc">
            Increase
        </button>

        <button class="btn btn-danger px-4" id="dec">
            Decrease
        </button>

        <button class="btn btn-secondary px-4" id="reset">
            Reset
        </button>

    </div>

</div>

    <script>
        const increase = document.getElementById("inc");
        const decrease = document.getElementById("dec");
        const reset = document.getElementById("reset");
        let count = 0;

        increase.onclick = function(){
            count++;

            document.getElementById("counter").textContent = count;
        }

        decrease.onclick = function(){
            count--;
            document.getElementById("counter").textContent = count;
        }

        reset.onclick = function(){
            count = 0;
            document.getElementById("counter").textContent = count;
        }
    </script>

</body>
</html>
